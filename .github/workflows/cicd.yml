name: Deploy React Application
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Login to docker hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Build Docker Image
        run: docker build -t iamhosto1000/easybank:latest .
      - name: Publish Image to docker hub
        run: docker push iamhosto1000/easybank:latest
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull image from docker hub
        run: docker pull iamhosto1000/easybank:latest
      - name: Delete old container
        run: docker rm -f easybank-container || true
      - name: Run Docker Container
        run: docker run -d -p 80:80 --name easybank-container iamhosto1000/easybank:latest
