name: Deploy React Application
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image
        run: docker build -t iamhosto1000/easybank.
      - name: Publish Image to docker hub
        run: docker push iamhosto1000/easybank:latest
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull image from docker hub
        run: docker pull iamhosto1000/easybank:latest
      - name: Delete old container
        run: docker rm -f easybank-container
      - name: Run Docker Container
        run: docker run -d -p 3000:80 --name easybank-container iamhosto1000/easybank
